<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinic Reports</title>

<link rel="stylesheet" href="sidebar.css" />

<style>
  body {
    display: flex;
    background: #f1f5f9;
    font-family: "Segoe UI", sans-serif;
    margin: 0;
  }

  .main {
    flex: 1;
    padding: 40px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: 24px;
    color: #1e293b;
    margin: 0;
  }

  .header p {
    font-size: 14px;
    color: #64748b;
    margin: 6px 0 0;
  }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    border: 1px solid #e2e8f0;
    background: #ffffff;
    color: #334155;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    gap: 8px;
    align-items: center;
    white-space: nowrap;
  }

  .btn svg {
    width: 16px;
    height: 16px;
  }

  .btn.primary {
    border: none;
    background: #142e5c;
    color: #ffffff;
    box-shadow: 0 12px 22px rgba(20, 46, 92, 0.18);
  }

  .btn.primary:hover {
    background: #0f2448;
  }

  .filters {
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .filters label {
    font-size: 12px;
    color: #475569;
    font-weight: 600;
  }

  .filters select {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 9px 10px;
    font-size: 13px;
    background: #f8fafc;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    align-items: start;
  }

  .card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    overflow: hidden;
  }

  .card h3 {
    margin: 0;
    padding: 14px 16px;
    font-size: 14px;
    color: #0f172a;
    border-bottom: 1px solid #e2e8f0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: #f8fafc;
    padding: 12px 16px;
    text-align: left;
    color: #64748b;
    font-weight: 600;
  }

  td {
    padding: 12px 16px;
    border-top: 1px solid #e2e8f0;
    color: #334155;
  }

  .name {
    font-weight: 600;
    color: #0f172a;
  }

  .due-date {
    color: #b45309;
    font-weight: 600;
  }

  .pill {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    line-height: 1.2;
    background: #fee2e2;
    color: #b91c1c;
  }

  @media (max-width: 980px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    body {
      flex-direction: column;
    }

    .sidebar {
      width: auto;
      height: auto;
    }

    .main {
      padding: 18px;
    }

    .header {
      flex-direction: column;
    }

    .actions {
      justify-content: flex-start;
      flex-wrap: wrap;
    }
  }
</style>
</head>

<body>
  <div class="sidebar">
    <div>
      <div class="sidebar-header">
        <img src="logo.png" class="sidebar-logo" />
        <div class="sidebar-text">
          <div class="sidebar-title">VaxAlert</div>
          <div class="sidebar-sub">Reganion Children's Clinic</div>
        </div>
      </div>

      <div class="menu">
        <a href="admindb.html">Dashboard</a>
        <a href="adminreminderlogs.html">Reminder Logs</a>
        <a href="adminreports.html" class="active">Reports</a>
        <a href="adminprofile.html">Profile</a>
      </div>
    </div>

    <div class="profile">
      <div class="profile-name" id="sidebarName"></div>
      <div style="font-size: 12px; color: #64748b">admin</div>
      <div class="signout" onclick="logout()">Sign Out</div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>Clinic Reports</h1>
        <p>Generate vaccination compliance reports</p>
      </div>

      <div class="actions">
        <button class="btn" type="button" id="printBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9V2h12v7"></path>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <path d="M6 14h12v8H6z"></path>
          </svg>
          Print
        </button>
        <button class="btn primary" type="button" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M12 15V3"></path>
          </svg>
          Export CSV
        </button>
      </div>
    </div>

    <div class="filters">
      <label for="period">Period:</label>
      <select id="period">
        <option selected>This Month</option>
        <option>Last Month</option>
        <option>This Quarter</option>
        <option>This Year</option>
      </select>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Due Soon Report</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Child</th>
                <th>Vaccine</th>
                <th>Due Date</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Overdue Report</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Child</th>
                <th>Vaccine</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
const API_BASE_URL = "http://localhost:5502";
let vaccinations = { due: [], overdue: [] };

function getAuthToken() { return localStorage.getItem("idToken"); }

async function apiCall(endpoint, options = {}) {
  const token = getAuthToken();
  if (!token) { window.location.href = "login.html"; return null; }
  const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}`, ...options.headers };
  try {
    const response = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers });
    if (response.status === 401 || response.status === 403) { localStorage.clear(); window.location.href = "login.html"; return null; }
    if (!response.ok) return null;
    return await response.json();
  } catch (error) { console.error("API call failed:", error); return null; }
}

async function verifyAdminAccess() {
  const profile = await apiCall("/api/admin/profile");
  if (!profile) {
    alert("Only admin accounts can access this page.");
    localStorage.clear();
    window.location.href = "login.html";
    return false;
  }
  return true;
}

function formatDate(timestamp) {
  if (!timestamp) return "N/A";
  const date = new Date(typeof timestamp === "number" ? timestamp : timestamp.seconds * 1000);
  return date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

async function loadAdminProfile() {
  const profile = await apiCall("/api/admin/profile");
  if (profile) {
    document.getElementById("sidebarName").textContent = `${profile.firstName} ${profile.lastName}`;
    localStorage.setItem("adminName", `${profile.firstName} ${profile.lastName}`);
  }
}

async function loadReports() {
  const allVaccs = await apiCall("/api/admin/vaccinations");
  if (!allVaccs) return;
  
  vaccinations.due = allVaccs.filter(v => v.status === "due");
  vaccinations.overdue = allVaccs.filter(v => v.status === "overdue");
  
  renderDueReport();
  renderOverdueReport();
}

function renderDueReport() {
  const tbody = document.querySelector(".card:nth-child(1) tbody");
  tbody.innerHTML = vaccinations.due.slice(0, 10).map(v => `
    <tr>
      <td class="name">${v.childName}</td>
      <td>${v.vaccineName}</td>
      <td class="due-date">${formatDate(v.dueDate)}</td>
    </tr>
  `).join("") || "<tr><td colspan='3' style='text-align:center; padding: 10px;'>No due vaccines</td></tr>";
}

function renderOverdueReport() {
  const tbody = document.querySelector(".card:nth-child(2) tbody");
  tbody.innerHTML = vaccinations.overdue.slice(0, 10).map(v => `
    <tr>
      <td class="name">${v.childName}</td>
      <td>${v.vaccineName}</td>
      <td><span class="pill">Overdue</span></td>
    </tr>
  `).join("") || "<tr><td colspan='3' style='text-align:center; padding: 10px;'>No overdue vaccines</td></tr>";
}

async function initializePage() {
  if (!await verifyAdminAccess()) return;
  await loadAdminProfile();
  await loadReports();
}

function logout() { localStorage.clear(); window.location.href = "login.html"; }

document.getElementById("printBtn").addEventListener("click", () => window.print());
document.getElementById("exportBtn").addEventListener("click", () => {
  let csv = "Due Soon Report\nChild,Vaccine,Due Date\n";
  vaccinations.due.forEach(v => {
    csv += `"${v.childName}","${v.vaccineName}","${formatDate(v.dueDate)}"\n`;
  });
  csv += "\nOverdue Report\nChild,Vaccine,Status\n";
  vaccinations.overdue.forEach(v => {
    csv += `"${v.childName}","${v.vaccineName}","Overdue"\n`;
  });
  
  const blob = new Blob([csv], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `admin-report-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  window.URL.revokeObjectURL(url);
});

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initializePage);
} else {
  initializePage();
}
  </script>
</body>
</html>
