<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Child Records</title>

<link rel="stylesheet" href="sidebar.css" />

<style>
  body {
    display: flex;
    background: #f1f5f9;
    font-family: "Segoe UI", sans-serif;
    margin: 0;
  }

  .main {
    flex: 1;
    padding: 40px;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .header h1 {
    font-size: 24px;
    color: #1e293b;
    margin: 0;
  }

  .header p {
    font-size: 14px;
    color: #64748b;
    margin: 6px 0 0;
  }

  .primary-btn {
    border: none;
    background: #142e5c;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 22px rgba(20, 46, 92, 0.18);
    white-space: nowrap;
  }

  .primary-btn:hover {
    background: #0f2448;
  }

  .primary-btn svg {
    width: 16px;
    height: 16px;
  }

  .card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    overflow: hidden;
  }

  .toolbar {
    padding: 14px 18px;
    border-bottom: 1px solid #e2e8f0;
  }

  .search {
    max-width: 340px;
  }

  .search input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    font-size: 13px;
    outline: none;
    background: #f8fafc;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: #f8fafc;
    padding: 12px 18px;
    text-align: left;
    color: #64748b;
    font-weight: 600;
  }

  td {
    padding: 14px 18px;
    border-top: 1px solid #e2e8f0;
    color: #334155;
  }

  .name {
    font-weight: 600;
    color: #0f172a;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    display: inline-block;
    line-height: 1.2;
  }

  .badge.overdue {
    background: #fee2e2;
    color: #b91c1c;
  }

  .badge.upcoming {
    background: #e0f2fe;
    color: #0369a1;
  }

  .actions {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: flex-end;
  }

  .icon-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    color: #64748b;
    padding: 4px;
    border-radius: 8px;
  }

  .icon-btn:hover {
    background: #f1f5f9;
    color: #0f172a;
  }

  .icon-btn svg {
    width: 18px;
    height: 18px;
  }

  @media (max-width: 720px) {
    body {
      flex-direction: column;
    }

    .sidebar {
      width: auto;
      height: auto;
    }

    .main {
      padding: 18px;
    }

    .header {
      align-items: stretch;
      flex-direction: column;
    }

    .primary-btn {
      width: fit-content;
    }

    .search {
      max-width: none;
    }
  }
</style>
</head>

<body>
  <div class="sidebar">
    <div>
      <div class="sidebar-header">
        <img src="logo.png" class="sidebar-logo" />
        <div class="sidebar-text">
          <div class="sidebar-title">VaxAlert</div>
          <div class="sidebar-sub">Reganion Children's Clinic</div>
        </div>
      </div>

      <div class="menu">
        <a href="staffdb.html">Dashboard</a>
        <a href="childrecords.html" class="active">Child Records</a>
        <a href="recordvaccine.html">Record Vaccine</a>
        <a href="reminderlogs.html">Reminder Logs</a>
        <a href="reports.html">Reports</a>
        <a href="staffprofile.html">Profile</a>
      </div>
    </div>

    <div class="profile">
      <div class="profile-name" id="sidebarName"></div>
      <div style="font-size: 12px; color: #64748b">staff</div>
      <div class="signout" onclick="logout()">Sign Out</div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>Child Records</h1>
        <p>Manage patient profiles and history</p>
      </div>

      <button class="primary-btn" type="button" id="addChildBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        Add Child Profile
      </button>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search">
          <input id="searchInput" type="text" placeholder="Search child or parent..." />
        </div>
      </div>

      <div style="overflow-x: auto">
        <table>
          <thead>
            <tr>
              <th>Child Name</th>
              <th>DOB</th>
              <th>Parent/Guardian</th>
              <th>Status Summary</th>
              <th style="text-align: right">Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
const API_BASE_URL = "http://localhost:5502";
let allChildren = [];

function getAuthToken() { return localStorage.getItem("idToken"); }

async function apiCall(endpoint, options = {}) {
  const token = getAuthToken();
  if (!token) { window.location.href = "login.html"; return null; }
  const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}`, ...options.headers };
  try {
    const response = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers });
    if (response.status === 401 || response.status === 403) { localStorage.clear(); window.location.href = "login.html"; return null; }
    if (!response.ok) return null;
    return await response.json();
  } catch (error) { console.error("API call failed:", error); return null; }
}

async function verifyStaffAccess() {
  const profile = await apiCall("/api/staff/profile");
  if (!profile) {
    alert("Only staff accounts can access this page.");
    localStorage.clear();
    window.location.href = "login.html";
    return false;
  }
  return true;
}

function formatDate(timestamp) {
  if (!timestamp) return "N/A";
  const date = new Date(typeof timestamp === "number" ? timestamp : timestamp.seconds * 1000);
  return date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

async function loadStaffProfile() {
  const profile = await apiCall("/api/staff/profile");
  if (profile) {
    document.getElementById("sidebarName").textContent = `${profile.firstName} ${profile.lastName}`;
    localStorage.setItem("staffName", `${profile.firstName} ${profile.lastName}`);
  }
}

async function loadChildren() {
  const children = await apiCall("/api/staff/children");
  if (!children) return;
  allChildren = children;
  render();
}

function summaryBadges(row) {
  const badges = [];
  if (row.overdue > 0) badges.push(`<span class="badge overdue">${row.overdue} Overdue</span>`);
  if (row.upcoming > 0) badges.push(`<span class="badge upcoming">${row.upcoming} Upcoming</span>`);
  return badges.join(" ");
}

function render() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const filtered = allChildren.filter(r => (r.firstName + " " + r.lastName + " " + r.parentName).toLowerCase().includes(q));

  document.getElementById("rows").innerHTML = filtered.map(r => `
    <tr>
      <td class="name">${r.firstName} ${r.lastName}</td>
      <td>${formatDate(r.dob)}</td>
      <td>${r.parentName}</td>
      <td><span class="status">${summaryBadges(r)}</span></td>
      <td style="text-align: right">
        <div class="actions">
          <button class="icon-btn" type="button" title="View">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </td>
    </tr>
  `).join("");
}

async function initializePage() {
  if (!await verifyStaffAccess()) return;
  await loadStaffProfile();
  await loadChildren();
}

function logout() { localStorage.clear(); window.location.href = "login.html"; }

document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("addChildBtn").addEventListener("click", () => { alert("Add Child Profile (implement as needed)"); });

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initializePage);
} else {
  initializePage();
}
  </script>
</body>
</html>
